@if (_open()) {
  <div
    class="nx-modal__overlay"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="title"
    (click)="onOverlayClick($event)"
    (keydown)="onKeydown($event)"
    tabindex="-1"
  >
    <div class="nx-modal__container" [class]="'nx-modal__container--' + size">
      <div class="nx-modal__header">
        <h2 class="nx-modal__title">{{ title }}</h2>
        <button
          class="nx-modal__close"
          type="button"
          aria-label="Fermer"
          (click)="close()"
        >
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <div class="nx-modal__body">
        <ng-content select="[modal-body]" />
      </div>

      <div class="nx-modal__footer">
        <ng-content select="[modal-footer]" />
      </div>
    </div>
  </div>
}
