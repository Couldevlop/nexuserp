<!doctype html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="utf-8" />
  <title>NexusERP — Intelligence at the Core of Every Decision</title>
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="NexusERP — Plateforme ERP/PGI de nouvelle génération, multi-tenant, IA intégrée, conforme PCG France et SYSCOHADA UEMOA." />
  <meta name="theme-color" content="#1E40AF" />

  <!-- Preconnect to font providers -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.webmanifest" />

  <!-- Open Graph -->
  <meta property="og:title" content="NexusERP" />
  <meta property="og:description" content="ERP de nouvelle génération — IA, multi-tenant, PCG & SYSCOHADA" />
  <meta property="og:type" content="website" />

  <!-- Security headers via meta (complement to server headers) -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
</head>
<body>
  <nx-root>
    <!-- Initial loading state shown before Angular bootstraps -->
    <div style="
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0F172A;
      flex-direction: column;
      gap: 1.5rem;
      font-family: 'DM Sans', sans-serif;
    ">
      <div style="
        display: flex;
        align-items: center;
        gap: 0.75rem;
        color: white;
      ">
        <span style="font-size: 2rem;">🔷</span>
        <span style="
          font-family: 'Plus Jakarta Sans', sans-serif;
          font-size: 1.75rem;
          font-weight: 700;
          letter-spacing: -0.025em;
          color: #60A5FA;
        ">NexusERP</span>
      </div>
      <div style="
        width: 2.5rem;
        height: 2.5rem;
        border: 3px solid rgba(255,255,255,0.15);
        border-top-color: #3B82F6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      "></div>
      <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        body { margin: 0; }
      </style>
    </div>
  </nx-root>
</body>
</html>
