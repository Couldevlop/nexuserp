name: Security (OWASP)

# Recommandations OWASP (CICD-SEC & DevSecOps) :
#  - SAST (CodeQL) sur Java / TS / Python
#  - Scan de vulnérabilités des dépendances + IaC (Trivy)
#  - Détection de secrets (Gitleaks) — OWASP A02/A07
#  - Scan SCA approfondi hebdomadaire (OWASP Dependency-Check)
#  - GITHUB_TOKEN en moindre privilège, élevé seulement là où nécessaire

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 3 * * 1'   # tous les lundis 03:00 UTC

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── SAST — CodeQL ──────────────────────────────────────────────────────────
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write   # nécessaire pour publier les alertes
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'

  # ─── SCA + IaC — Trivy ──────────────────────────────────────────────────────
  trivy:
    name: Trivy (deps + IaC + secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        # tag 'master' = référence documentée et toujours résolue (peut être épinglée à un SHA)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: '.'
          scanners: 'vuln,misconfig,secret'
          severity: 'CRITICAL,HIGH'
          format: sarif
          output: trivy-results.sarif
        # Ne bloque pas le merge tant que les findings ne sont pas triés ;
        # les résultats restent visibles dans l'onglet Security.
        continue-on-error: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

  # ─── Détection de secrets — Gitleaks ────────────────────────────────────────
  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── SCA approfondi (hebdomadaire) — OWASP Dependency-Check ──────────────────
  dependency-check:
    name: OWASP Dependency-Check
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        continue-on-error: true
        with:
          project: nexuserp
          path: '.'
          format: 'SARIF'
          args: '--failOnCVSS 7 --enableExperimental'
      - name: Upload Dependency-Check SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: dependency-check
