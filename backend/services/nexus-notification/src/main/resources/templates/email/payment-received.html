<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8"/>
  <title>Paiement reçu — NexusERP</title>
  <style>
    body { font-family: Arial, sans-serif; background: #F8FAFC; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 32px auto; background: #fff; border-radius: 10px; box-shadow: 0 4px 16px rgba(15,23,42,.12); overflow: hidden; }
    .header { background: #059669; padding: 24px 32px; text-align: center; }
    .header h1 { color: #fff; font-size: 22px; margin: 0; }
    .body { padding: 32px; color: #0F172A; font-size: 15px; line-height: 1.6; }
    .success { background: #ECFDF5; border-left: 4px solid #10B981; padding: 12px 16px; border-radius: 4px; margin: 16px 0; }
    .amount { font-size: 36px; font-weight: bold; color: #059669; text-align: center; padding: 16px; }
    table { width: 100%; border-collapse: collapse; margin: 16px 0; }
    th { background: #ECFDF5; padding: 10px 12px; text-align: left; font-size: 13px; }
    td { padding: 10px 12px; border-bottom: 1px solid #F1F5F9; font-size: 14px; }
    .footer { background: #F1F5F9; padding: 16px 32px; text-align: center; color: #64748B; font-size: 12px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header"><h1>NexusERP Finance — Paiement Reçu</h1></div>
  <div class="body">
    <p th:text="'Bonjour ' + ${recipientName} + ','">Bonjour,</p>
    <div class="success">Un paiement a été reçu et enregistré avec succès.</div>
    <div class="amount" th:text="${amount}">0,00 €</div>
    <table>
      <tr><th>N° Facture</th><td th:text="${invoiceNumber}">-</td></tr>
      <tr><th>Payeur</th><td th:text="${payerName}">-</td></tr>
      <tr><th>Mode de paiement</th><td th:text="${paymentMethod}">-</td></tr>
      <tr><th>Date</th><td th:text="${paymentDate}">-</td></tr>
      <tr><th>Référence</th><td th:text="${reference}">-</td></tr>
    </table>
  </div>
  <div class="footer"><p>© 2026 NexusERP — Intelligence at the Core of Every Decision</p></div>
</div>
</body>
</html>
