server:
  port: 8093
  servlet:
    context-path: /

spring:
  application:
    name: nexus-payment
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nexuserp}?currentSchema=nexus_payment
    username: ${DB_USER:nexus}
    password: ${DB_PASSWORD:nexus_dev_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: NexusPaymentPool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: nexus_payment
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 500
          order_inserts: true
          order_updates: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: nexus_payment
    baseline-on-migrate: true
    validate-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: nexus-payment
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:nexus_redis_secret}
      timeout: 2000ms

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URL:${KEYCLOAK_URL:http://localhost:8180}}/realms/nexuserp
          jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/nexuserp/protocol/openid-connect/certs
  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 minutes

# ─────────────────────────────────────────────────────────────────────────────
# Configuration des providers Mobile Money.
# OWASP A02 : les webhook-secret proviennent des variables d'environnement / Vault.
# Les valeurs par défaut ci-dessous sont des secrets de DÉVELOPPEMENT uniquement —
# elles DOIVENT être surchargées en staging/production.
#
# ACTIVATION RÉEL vs SIMULÉ (zéro-code) :
#   Chaque provider possède un bloc `real`. Tant que ses identifiants REQUIS sont VIDES
#   (valeur par défaut), la stratégie SIMULÉE est utilisée. Dès que les variables
#   d'environnement ci-dessous sont renseignées, le provider bascule automatiquement
#   sur son API RÉELLE — aucune modification de code, juste un redémarrage.
#
#   Identifiants requis par provider pour passer en RÉEL :
#     orange_money : ORANGE_CLIENT_ID + ORANGE_CLIENT_SECRET + ORANGE_MERCHANT_KEY
#     wave         : WAVE_API_KEY
#     mtn_momo     : MTN_API_USER + MTN_API_USER_KEY + MTN_SUBSCRIPTION_KEY
#     moov_money   : MOOV_REAL_BASE_URL + MOOV_API_KEY
# ─────────────────────────────────────────────────────────────────────────────
nexus:
  # ───────────────────────────────────────────────────────────────────────────
  # Store de configuration centralisé (service nexus-config).
  # Les clés providers saisies dans l'UI admin Paramétrage (chiffrées AES-256-GCM,
  # par tenant) sont PRIORITAIRES sur les variables d'environnement ci-dessous.
  # URL vide => ConfigClient inactif, seul l'env s'applique (fallback non-bloquant).
  # ───────────────────────────────────────────────────────────────────────────
  config:
    url: ${NEXUS_CONFIG_URL:}
    service-token: ${NEXUS_CONFIG_SERVICE_TOKEN:}
    cache-ttl-seconds: ${NEXUS_CONFIG_CACHE_TTL_SECONDS:60}
  payment:
    callback-base-url: ${PAYMENT_CALLBACK_BASE_URL:http://localhost:8093/api/v1/payments/webhooks}
    providers:
      orange_money:
        enabled: true
        webhook-secret: ${ORANGE_WEBHOOK_SECRET:dev-orange-webhook-secret}
        api-base-url: ${ORANGE_API_BASE_URL:https://api.sandbox.orange.com}
        api-key: ${ORANGE_API_KEY:dev-orange-api-key}
        real:
          base-url: ${ORANGE_REAL_BASE_URL:${ORANGE_API_BASE_URL:https://api.orange.com}}
          token-url: ${ORANGE_TOKEN_URL:}
          client-id: ${ORANGE_CLIENT_ID:}
          client-secret: ${ORANGE_CLIENT_SECRET:}
          merchant-key: ${ORANGE_MERCHANT_KEY:}
          return-url: ${ORANGE_RETURN_URL:}
          cancel-url: ${ORANGE_CANCEL_URL:}
          currency: ${ORANGE_CURRENCY:}
      wave:
        enabled: true
        webhook-secret: ${WAVE_WEBHOOK_SECRET:dev-wave-webhook-secret}
        api-base-url: ${WAVE_API_BASE_URL:https://api.wave.com}
        api-key: ${WAVE_API_KEY:dev-wave-api-key}
        real:
          base-url: ${WAVE_REAL_BASE_URL:https://api.wave.com}
          api-key: ${WAVE_REAL_API_KEY:}
          return-url: ${WAVE_SUCCESS_URL:}
          cancel-url: ${WAVE_ERROR_URL:}
          currency: ${WAVE_CURRENCY:}
      mtn_momo:
        enabled: true
        webhook-secret: ${MTN_WEBHOOK_SECRET:dev-mtn-webhook-secret}
        api-base-url: ${MTN_API_BASE_URL:https://sandbox.momodeveloper.mtn.com}
        api-key: ${MTN_API_KEY:dev-mtn-api-key}
        real:
          base-url: ${MTN_REAL_BASE_URL:${MTN_API_BASE_URL:https://sandbox.momodeveloper.mtn.com}}
          api-user: ${MTN_API_USER:}
          api-user-key: ${MTN_API_USER_KEY:}
          subscription-key: ${MTN_SUBSCRIPTION_KEY:}
          target-environment: ${MTN_TARGET_ENVIRONMENT:sandbox}
          currency: ${MTN_CURRENCY:}
      moov_money:
        enabled: true
        webhook-secret: ${MOOV_WEBHOOK_SECRET:dev-moov-webhook-secret}
        api-base-url: ${MOOV_API_BASE_URL:https://api.moov-africa.ci}
        api-key: ${MOOV_API_KEY:dev-moov-api-key}
        real:
          base-url: ${MOOV_REAL_BASE_URL:}
          api-key: ${MOOV_API_KEY:}
          return-url: ${MOOV_RETURN_URL:}
          currency: ${MOOV_CURRENCY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      service: nexus-payment
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.nexuserp.payment: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","service":"nexus-payment","tenantId":"%X{tenantId}","traceId":"%X{traceId}","message":"%message"}%n'
