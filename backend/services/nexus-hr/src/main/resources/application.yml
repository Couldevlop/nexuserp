server:
  port: 8080

spring:
  application:
    name: nexus-hr
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nexus}
    username: ${DB_USER:nexus}
    password: ${DB_PASSWORD:nexus}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: ${TENANT_SCHEMA:public}
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: nexus-hr
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 minutes
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URL:${KEYCLOAK_URL:http://localhost:8180}}/realms/${KEYCLOAK_REALM:nexuserp}
          jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:nexuserp}/protocol/openid-connect/certs
# HR-specific configuration
nexuserp:
  hr:
    payroll:
      # France: minimum wage 2026
      smic-mensuel-brut: 1766.92
      # CI: smig mensuel (XOF)
      smig-ci: 75000
    leave:
      # Default annual leave days
      annual-leave-days-fr: 25
      annual-leave-days-ci: 24
    dsn:
      enabled: ${DSN_ENABLED:false}
      endpoint: ${DSN_ENDPOINT:https://dsn.net-entreprises.fr}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 0.1

logging:
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","service":"nexus-hr","tenantId":"%X{tenantId}","userId":"%X{userId}","traceId":"%X{traceId}","spanId":"%X{spanId}","message":"%message"}%n'
  level:
    com.nexuserp: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
