server:
  port: 8094
  servlet:
    context-path: /

spring:
  application:
    name: nexus-config
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nexuserp}?currentSchema=nexus_config
    username: ${DB_USER:nexus}
    password: ${DB_PASSWORD:nexus_dev_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: NexusConfigPool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: nexus_config
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 500
          order_inserts: true
          order_updates: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: nexus_config
    baseline-on-migrate: true
    validate-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: nexus-config
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/nexuserp

# ─────────────────────────────────────────────────────────────────────────────
# Chiffrement des secrets (OWASP A02).
#   NEXUS_CONFIG_MASTER_KEY : clé maître AES-256 en base64 (32 octets).
#   - OBLIGATOIRE en staging/production (le service refuse de démarrer sinon).
#   - En dev, si absente, une clé dérivée DEV-ONLY est utilisée (log WARNING).
#   Générer une clé : `openssl rand -base64 32`
# ─────────────────────────────────────────────────────────────────────────────
nexus:
  config:
    encryption:
      master-key: ${NEXUS_CONFIG_MASTER_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      service: nexus-config
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.nexuserp.config: INFO
    nexus.config.audit: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","service":"nexus-config","tenantId":"%X{tenantId}","traceId":"%X{traceId}","message":"%message"}%n'
