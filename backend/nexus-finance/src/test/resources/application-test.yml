spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:tc:postgresql:16:///nexus_finance_test}
    username: ${SPRING_DATASOURCE_USERNAME:nexus}
    password: ${SPRING_DATASOURCE_PASSWORD:nexus_test}
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: public
  kafka:
    bootstrap-servers: ${spring.kafka.bootstrap-servers:localhost:9092}
    consumer:
      auto-offset-reset: earliest
  data:
    redis:
      host: ${spring.data.redis.host:localhost}
      port: ${spring.data.redis.port:6379}

# Override Keycloak with mock
spring.security.oauth2.resourceserver.jwt:
  issuer-uri: http://localhost:8180/realms/nexuserp
  jwk-set-uri: http://localhost:8180/realms/nexuserp/protocol/openid-connect/certs

nexuserp:
  tenant:
    default: fr-integration
  compliance:
    strict: true

logging:
  level:
    com.nexuserp: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: DEBUG
